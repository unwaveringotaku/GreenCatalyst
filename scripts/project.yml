name: GreenCatalyst
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
    macOS: "26.0"

packages: {}

targets:
  GreenCatalystApp:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/GreenCatalystApp
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.example.greencatalyst
        SWIFT_STRICT_CONCURRENCY: complete
    scheme:
      testTargets: []

  GreenCatalystWatch:
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/GreenCatalystWatch
    settings:
      base:
        WATCHOS_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.example.greencatalyst.watch

  GreenCatalystWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/GreenCatalystWidgets
    settings:
      base:
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.example.greencatalyst.widgets
    info:
      path: Sources/GreenCatalystWidgets/Info.plist

